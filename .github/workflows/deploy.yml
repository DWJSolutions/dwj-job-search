name: Deploy DWJ Job Search

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline || npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Install API deps
        working-directory: api
        run: npm ci --prefer-offline || npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI service deps
        working-directory: ai
        run: pip install -r requirements.txt

  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"

  deploy-api:
    name: Trigger API Deploy → Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (API)
        run: |
          curl -s -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body || echo "Render hook not configured — skipping"

  deploy-ai:
    name: Trigger AI Service Deploy → Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (AI)
        run: |
          curl -s -X POST "${{ secrets.RENDER_AI_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body || echo "Render AI hook not configured — skipping"
